all:
  vars:
    ansible_ssh_pipelining: true
  children:
    picluster_leader:
      hosts:
        picluster-01.home.lan:
          ansible_host: 192.168.1.80
      vars:
        k3s_role: leader
    picluster_server:
      hosts: {}
      vars:
        k3s_role: server
    picluster_agent:
      hosts:
        picluster-02.home.lan:
          ansible_host: 192.168.1.199
        picluster-03.home.lan:
          ansible_host: 192.168.1.250
        picluster-04.home.lan:
          ansible_host: 192.168.1.118
      vars:
        k3s_role: agent
    linux:
      hosts:
        palantir-mobile.home.lan:
          ansible_host: 192.168.1.3
    nonstd_linux:
      hosts:
        synology.home.lan:
          ansible_host: 192.168.1.28
          ansible_port: 8422
